<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CocosForge Preview</title>
    <style>
      body { margin: 0; background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
      #app { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      canvas { border: 1px solid #334155; background: #020617; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
document.addEventListener("DOMContentLoaded", () => {
  const app = document.getElementById("app");
  if (app) {
    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 600;
    app.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    if (ctx) {
      setupGame(ctx);
      startGameLoop(ctx);
    }
  }
});
function setupGame(ctx) {
  const player = {
    x: 100,
    y: 400,
    width: 50,
    height: 50,
    color: "blue",
    speed: 5,
    jumpSpeed: -15,
    gravity: 1,
    velocityY: 0,
    onGround: true
  };
  function drawPlayer() {
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
  }
  function updatePlayer() {
    if (!player.onGround) {
      player.velocityY += player.gravity;
      player.y += player.velocityY;
    }
    if (player.y + player.height >= 550) {
      player.y = 550 - player.height;
      player.velocityY = 0;
      player.onGround = true;
    }
    if (keys.ArrowLeft) {
      player.x -= player.speed;
    }
    if (keys.ArrowRight) {
      player.x += player.speed;
    }
  }
  const keys = {};
  window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (e.key === "ArrowUp" && player.onGround) {
      player.velocityY = player.jumpSpeed;
      player.onGround = false;
    }
  });
  window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
  });
  return { drawPlayer, updatePlayer };
}
function startGameLoop(ctx) {
  const { drawPlayer, updatePlayer } = setupGame(ctx);
  function gameLoop() {
    ctx.clearRect(0, 0, 800, 600);
    updatePlayer();
    drawPlayer();
    requestAnimationFrame(gameLoop);
  }
  gameLoop();
}
export {
  setupGame,
  startGameLoop
};

    </script>
  </body>
</html>
