# GameForge Server configuration.
# Keep this file encoded as UTF-8.

spring:
  application:
    name: gameforge-server
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://10.5.32.22:5432/game_forge
    username: admin
    password: your_password
    hikari:
      connection-test-query: SELECT 1
  sql:
    init:
      mode: never
  data:
    redis:
      host: 10.5.32.22
      port: 6379
      password:
      database: 0

server:
  port: 8080

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: gameforge-producer

gameforge:
  database:
    skip-auto-create-database: false
    maintenance-database: postgres
  auth:
    refresh-token-ttl: P7D
    permit-paths:
      - /api/users/login
      - /api/users/register
      - /api/users/refresh-token
    jwt:
      secret: dev-only-change-me-gameforge-jwt-secret-32-bytes-minimum
      access-token-ttl: PT24H
